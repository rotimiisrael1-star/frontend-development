<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Landing Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            width: 300px;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome to Our Service!</h2>
        <p>Please sign up to get the latest updates.</p>
        <form id="signupForm" onsubmit="return submitForm()">
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>
            <input type="submit" value="Sign Up">
        </form>
    </div>

    <script>
        function submitForm() {
            var email = document.getElementById("email").value;
            // You can add further logic to handle the form submission here
            alert("Thank you for signing up with " + email + "!");
            return false; // To prevent the page from refreshing
        }
    </script>
</body>
</html>
