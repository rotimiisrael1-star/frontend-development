<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment Tracking System Dashboard</title>
    <style>
        /* CSS for dashboard layout */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        .main-content {
            padding: 20px;
        }
        /* CSS for individual sections */
        /* You can customize these styles as needed */
        .experiment-section {
            background-color: #f2f2f2;
            padding: 20px;
        }
        .inventory-section {
            background-color: #f9f9f9;
            padding: 20px;
        }
        .visualization-section {
            background-color: #e6e6e6;
            padding: 20px;
        }
        .search-section {
            background-color: #d9d9d9;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="#experiment">Experiment Management</a>
    <a href="#inventory">Inventory Management</a>
    <a href="#visualization">Visualization and Analysis</a>
    <a href="#search">Search and Filter</a>
</div>

<div class="main-content">
    <div id="experiment" class="experiment-section">
        <h2>Experiment Management</h2>
        <!-- Add content for Experiment Management section -->
    </div>
    <div id="inventory" class="inventory-section">
        <h2>Inventory Management</h2>
        <!-- Add content for Inventory Management section -->
    </div>
    <div id="visualization" class="visualization-section">
        <h2>Visualization and Analysis</h2>
        <!-- Add content for Visualization and Analysis section -->
    </div>
    <div id="search" class="search-section">
        <h2>Search and Filter</h2>
        <!-- Add content for Search and Filter section -->
    </div>
</div>

</body>
</html>
