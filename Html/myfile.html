<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment Dashboard</title>
</head>
<body>
    <h1>Experiment Management</h1>
    
    <!-- Form to add a new experiment -->
    <form action="/experiments/add" method="POST">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title"><br>
        <label for="description">Description:</label>
        <textarea id="description" name="description"></textarea><br>
        <label for="status">Status:</label>
        <select id="status" name="status">
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Pending">Pending</option>
        </select><br>
        <button type="submit">Add Experiment</button>
    </form>

    <h2>Experiments</h2>
    <ul>
        {% for experiment in experiments %}
            <li>{{ experiment.title }} - {{ experiment.status }}</li>
            <p>{{ experiment.description }}</p>
        {% endfor %}
    </ul>
</body>
</html>

<!-- Experiment Creation Form -->
<form action="/experiments/create" method="POST">
    <label for="title">Title:</label><br>
    <input type="text" id="title" name="title" required><br>
    <label for="description">Description:</label><br>
    <textarea id="description" name="description" rows="4" required></textarea><br>
    <!-- Add more fields for procedures, protocols, associated metadata, etc. -->
    <button type="submit">Create Experiment</button>
</form>

<!-- Inventory Update Form -->
<form action="/inventory/update" method="POST">
    <label for="item">Item:</label><br>
    <input type="text" id="item" name="item" required><br>
    <label for="quantity">Quantity:</label><br>
    <input type="number" id="quantity" name="quantity" required><br>
    <label for="location">Location:</label><br>
    <input type="text" id="location" name="location" required><br>
    <button type="submit">Update Inventory</button>
</form>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Visualization and Analysis</title>
    <!-- Include Plotly.js library -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <!-- Placeholder for the graph -->
    <div id="graph"></div>

    <script>
        // Fetch experiment results data from the backend using AJAX
        fetch('/experiment_results')
            .then(response => response.json())
            .then(data => {
                // Process the fetched data
                var experimentNames = [];
                var results = [];

                data.forEach(experiment => {
                    experimentNames.push(experiment.title);
                    results.push(experiment.result);
                });

                // Plot the graph
                var trace = {
                    x: experimentNames,
                    y: results,
                    type: 'bar'
                };

                var layout = {
                    title: 'Experiment Results',
                    xaxis: { title: 'Experiment' },
                    yaxis: { title: 'Result' }
                };

                Plotly.newPlot('graph', [trace], layout);
            })
            .catch(error => console.error('Error fetching data:', error));
    </script>
</body>
</html>
