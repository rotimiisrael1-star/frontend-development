<!DOCTYPE html>
<html>
<head>
  <title>Chess Board</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f2f2f2;
    }

    .chessboard {
      display: grid;
      grid-template-columns: repeat(8, 50px);
      grid-template-rows: repeat(8, 50px);
    }

    .light-blue {
      background-color: #3BB9EB;
    }

    .dark-blue {
      background-color: #0A58A9;
    }

    /* To create the checkerboard pattern */
    .chessboard > div:nth-child(even) {
      background-color: #0A58A9;
    }
  </style>
</head>
